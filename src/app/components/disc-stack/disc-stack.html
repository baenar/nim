<div class="stack-container" [class.selected]="selected()" [class.empty]="isEmpty()">
  <div class="stack-label">Stack {{ stackIndex() + 1 }}</div>
  <div class="stack-count">{{ height() }}</div>
  <div class="pole-area">
    <div class="pole"></div>
    <div class="discs-wrapper">
      @if (isTruncated()) {
        @for (disc of topDiscs(); track disc) {
          <div class="disc">
            <div class="disc-top"></div>
            <div class="disc-body"></div>
          </div>
        }
        <div class="disc-overflow">
          <span class="overflow-dots">+{{ hiddenCount() }}</span>
        </div>
      }
      @for (disc of bottomDiscs(); track disc) {
        <div class="disc">
          <div class="disc-top"></div>
          <div class="disc-body"></div>
        </div>
      }
    </div>
    <div class="base"></div>
  </div>
</div>
